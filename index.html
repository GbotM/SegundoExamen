<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Producción de Leche</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Calculadora de Leche</h2>
        <div class="form-group">
            <label for="litros">Cantidad de Litros (L):</label>
            <input type="number" id="litros" placeholder="Ej. 500">
        </div>
        <div class="form-group">
            <label for="precio">Precio por Galón (PG):</label>
            <input type="number" step="0.01" id="precio" placeholder="Ej. 3.50">
        </div>
        <button onclick="calcularLeche()">Calcular Ganancia</button>

        <div class="resultado" id="resultadoBox" style="display: none;">
            <h3>Resultado:</h3>
            <p id="txtGalones"></p>
            <p id="txtGanancia"></p>
        </div>
    </div>

    <script>
        // Detección automática: si estás en tu PC usa localhost, si estás en internet usa Render
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://segundoexamen.onrender.com';

        async function calcularLeche() {
            const litros = parseFloat(document.getElementById('litros').value);
            const precio = parseFloat(document.getElementById('precio').value);

            if (isNaN(litros) || isNaN(precio)) {
                alert('Por favor ingresa valores numéricos válidos.');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/calcular-leche`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ L: litros, PG: precio })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('resultadoBox').style.display = 'block';
                    document.getElementById('txtGalones').innerText = `Galones producidos (TG): ${data.resultado.TG} gal`;
                    document.getElementById('txtGanancia').innerText = `Ganancia total (GA): $${data.resultado.GA}`;
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                alert('No se pudo conectar con el servidor. (Nota: Si tu servicio en Render acaba de despertar, espera unos segundos e inténtalo de nuevo).');
            }
        }
    </script>
</body>
</html>
